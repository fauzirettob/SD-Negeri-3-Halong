<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SD NEGERI 3 HALONG</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .login-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-lighter) 0%, #fff 40%, var(--accent-light) 100%);
      padding: 100px 20px 40px;
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(0,0,0,.04);
    }
    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #fff;
      margin: 0 auto 20px;
      box-shadow: 0 4px 16px rgba(30,64,175,.3);
    }
    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-card p.sub {
      text-align: center;
      color: var(--text-light);
      font-size: .9rem;
      margin-bottom: 32px;
    }
    .login-error {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .login-error.show { display: flex; }
    .login-card .form-group { margin-bottom: 20px; }
    .login-card .form-label { display: block; margin-bottom: 6px; font-weight: 600; font-size: .88rem; color: var(--text); }
    .login-card .form-input {
      width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: var(--radius);
      font-size: .95rem; font-family: inherit; color: var(--text); background: var(--white);
      transition: var(--transition); outline: none;
    }
    .login-card .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30,64,175,.12); }
    .login-card .btn { width: 100%; justify-content: center; padding: 16px; font-size: 1rem; }
    .login-footer { text-align: center; margin-top: 24px; }
    .login-footer a { color: var(--primary); font-weight: 600; font-size: .88rem; }
    .login-footer a:hover { text-decoration: underline; }
    .password-wrapper { position: relative; }
    .password-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-lighter); cursor: pointer;
      font-size: 1.1rem; padding: 4px;
    }
    .password-toggle:hover { color: var(--text); }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo-icon">
          <img src="img/profil/logo.jpg" alt="SD NEGERI 3 HALONG">
        </div>
        <div>
          <h1>SD NEGERI 3 HALONG</h1>
        </div>
      </a>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="nav-links" id="mobileMenu">
        <li><a href="index.html">Beranda</a></li>
        <li class="nav-item">
          <a href="sambutan.html">Profil <i class="fas fa-chevron-down dropdown-icon"></i></a>
          <div class="nav-dropdown">
            <a href="sambutan.html"><i class="fas fa-greeting"></i> Sambutan</a>
            <a href="visi-misi.html"><i class="fas fa-bullseye"></i> Visi & Misi</a>
            <a href="sejarah.html"><i class="fas fa-history"></i> Sejarah</a>
            <a href="guru.html"><i class="fas fa-sitemap"></i> Struktur Organisasi</a>
          </div>
        </li>
        <li><a href="program.html">Program</a></li>
        <li><a href="prestasi.html">Prestasi</a></li>
        <li><a href="informasi.html">Informasi</a></li>
        <li><a href="galeri.html">Dokumentasi</a></li>
        <li><a href="kontak.html">Kontak</a></li>
      </ul>
      <a href="admin.html" class="nav-login-link"><i class="fas fa-shield-alt"></i> Panel Admin</a>
    </div>
  </nav>

  <div class="login-body">
  <div class="login-card animate-on-scroll visible">
    <div class="login-logo"><i class="fas fa-shield-alt"></i></div>
    <h1>Login Admin</h1>
    <p class="sub">Masuk ke panel admin SD Negeri 3 Halong</p>

    <div class="login-error" id="loginError">
      <i class="fas fa-exclamation-circle"></i>
      <span id="loginErrorMsg">Username atau password salah!</span>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username"><i class="fas fa-user" style="margin-right: 6px; color: var(--text-lighter);"></i>Username</label>
        <input type="text" id="username" class="form-input" placeholder="Masukkan username admin" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password"><i class="fas fa-lock" style="margin-right: 6px; color: var(--text-lighter);"></i>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-input" placeholder="Masukkan password" required>
          <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
            <i class="far fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i> Masuk
      </button>
    </form>

    <div class="login-footer">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>
  </div>
  </div>

  <script src="script.js"></script>
  <script>
    // ===== KREDENSIAL DEFAULT =====
    // Username: admin
    // Password: admin123
    // ⚠️ GANTI PASSWORD setelah login pertama!
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('loginError');
      const errorMsg = document.getElementById('loginErrorMsg');

      if (!username || !password) {
        errorMsg.textContent = 'Mohon isi username dan password!';
        errorEl.classList.add('show');
        return;
      }

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        // Save login session
        try {
          localStorage.setItem('sdN3_admin_logged_in', 'true');
          localStorage.setItem('sdN3_admin_session', Date.now().toString());
        } catch(e) {}
        window.location.href = 'admin.html';
      } else {
        errorMsg.textContent = 'Username atau password salah! Silakan coba lagi.';
        errorEl.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    // If already logged in, redirect to admin
    if (localStorage.getItem('sdN3_admin_logged_in') === 'true') {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
